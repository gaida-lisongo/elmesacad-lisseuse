name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches:
      - main # Ou le nom de votre branche principale

# Requis pour pousser la branche gh-pages avec GITHUB_TOKEN (sinon 403 denied to github-actions[bot]).
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web
        # Flutter stable récent : CanvasKit est le moteur web par défaut (--web-renderer a été retiré).
        run: flutter build web --release --base-href /${{ github.event.repository.name }}/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web