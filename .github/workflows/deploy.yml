# Déploiement Flutter Web → GitHub Pages (méthode officielle : artefact + deploy-pages).
#
# APRÈS le premier déploiement réussi, configurez le dépôt UNE fois :
#   Settings → Pages → Build and deployment → Source : « GitHub Actions »
#   (pas « Deploy from a branch » si vous utilisez ce workflow.)
#
# URL du site (dépôt projet) :
#   https://<owner>.github.io/<nom-du-repo>/
# Exemple : https://gaida-lisongo.github.io/elmesacad-lisseuse/
# N’ouvrez pas seulement https://<owner>.github.io/ — ce n’est pas la racine de ce projet.

name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Dependencies
        run: flutter pub get

      - name: Build web
        run: >
          flutter build web --release
          --base-href /${{ github.event.repository.name }}/

      - name: SPA fallback (404 = index)
        run: |
          cp build/web/index.html build/web/404.html
          touch build/web/.nojekyll

      - name: Vérifier la sortie
        run: |
          test -f build/web/index.html || (echo "index.html manquant" && exit 1)
          ls -la build/web | head -40

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
