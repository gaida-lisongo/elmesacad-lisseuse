# Déploiement sur GitHub Pages (branche gh-pages).
#
# Réglages dépôt obligatoires : Settings → Pages → Build and deployment
#   Source : « Deploy from a branch » (PAS « GitHub Actions » seul si vous utilisez peaceiris)
#   Branch : gh-pages  /  Folder : / (root)
#
# URL du site (projet) : https://<owner>.github.io/<nom-du-repo>/
#   (ex. https://gaida-lisongo.github.io/elmesacad-lisseuse/ )
# Ne pas ouvrir https://<owner>.github.io/ seul : ce n’est pas ce dépôt.

name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches:
      - main # Ou le nom de votre branche principale

# Requis pour pousser la branche gh-pages avec GITHUB_TOKEN (sinon 403 denied to github-actions[bot]).
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web
        # base-href = chemin du site projet sur GitHub Pages (doit correspondre au nom du dépôt).
        run: flutter build web --release --base-href /${{ github.event.repository.name }}/

      # GitHub Pages sert 404.html pour chemins inconnus : copie = même SPA (routes client).
      - name: Copy index.html to 404.html (SPA fallback)
        run: cp build/web/index.html build/web/404.html

      - name: List build output (debug)
        run: ls -la build/web | head -30

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web